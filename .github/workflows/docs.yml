name: Build docs

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "mkdocs>=1.6,<2.0"
          pip install "mkdocs-material>=9.5,<9.7.0"
          pip install "mkdocs-with-pdf>=0.9,<1.0"

      - name: Build MkDocs site
        run: |
          cd P5
          mkdocs build --clean

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-site
          path: P5/site/